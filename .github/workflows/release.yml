name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64) host build.
          - os: macos-latest
          # macOS Intel (x64) build. The macos-13 Intel runner was retired by
          # GitHub, so we cross-compile x86_64 from an Apple Silicon runner.
          - os: macos-14
            pi_target_platform: darwin-x64
            rust_target: x86_64-apple-darwin
          # Linux deb/rpm bundling is currently more stable on 22.04 than
          # 24.04 for GTK/WebKit bundles in CI.
          - os: ubuntu-22.04
            pi_target_platform: linux-x64
          - os: ubuntu-24.04-arm
            pi_target_platform: linux-arm64
          - os: windows-2022
            pi_target_platform: windows-x64
          - os: windows-11-arm
            pi_target_platform: windows-arm64

    runs-on: ${{ matrix.os }}

    env:
      # Mitigate intermittent crates.io download failures on CI runners
      # ("curl failed [16] Error in the HTTP2 framing layer"). Disabling
      # HTTP/2 multiplexing forces cargo's curl downloader back to HTTP/1.1,
      # which avoids the flaky HTTP2 framing-layer errors. The sparse
      # protocol + retries make transient registry hiccups self-healing.
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_HTTP_CHECK_REVOKE: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Cache the cargo registry + git db + target dir so successful crate
      # downloads survive across runs. This both speeds up builds and makes
      # transient crates.io download failures far less likely to break a
      # release (the crate is usually already on disk from a prior run).
      - name: Cache cargo + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          WEBKIT_DEV_PKG="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_DEV_PKG" >/dev/null 2>&1; then
            WEBKIT_DEV_PKG="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get install -y \
            desktop-file-utils \
            "$WEBKIT_DEV_PKG" \
            libappindicator3-dev \
            librsvg2-dev \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            rpm \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the downloaded pi tarballs across runs to avoid pulling ~30 MB
      # from GitHub releases on every build. The key includes the locked
      # version file so a version bump invalidates the cache automatically.
      - name: Cache pi binary downloads
        uses: actions/cache@v5
        with:
          path: .cache/pi-binaries
          key: pi-binaries-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/pi-version.json') }}

      - name: Fetch embedded pi binary
        env:
          PI_TARGET_PLATFORM: ${{ matrix.pi_target_platform }}
        run: bun run fetch:pi

      # Sanity-check that the embedded binary actually runs. We can only do
      # this when the embedded binary's architecture matches the runner's:
      # the macos-14 job cross-compiles an x86_64 (darwin-x64) binary on an
      # Apple Silicon runner, which would SIGILL ("Illegal instruction",
      # exit 132) if executed here. That cross-built binary is exercised on
      # its own native runner instead. `matrix.rust_target` is only set for
      # the cross-compile job, so its absence means host arch == target arch.
      - name: Verify embedded pi runs (Unix)
        if: runner.os != 'Windows' && matrix.rust_target == ''
        run: ./src-tauri/resources/pi/pi --version

      - name: Verify embedded pi runs (Windows)
        if: runner.os == 'Windows' && matrix.rust_target == ''
        run: .\src-tauri\resources\pi\pi.exe --version

      - name: Build pi extensions bundle
        run: bun run build:extensions

      - name: Build Tauri app (Linux deb + rpm) and publish assets
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Workaround for linuxdeploy/strip failures on modern ELF
          # binaries (e.g. `.relr.dyn`), see tauri#14796.
          NO_STRIP: "true"
          # Signing key for the Tauri updater. Required so the bundler
          # produces `*.sig` files and `latest.json` (the manifest the
          # auto-updater reads from the GitHub release). Configure these
          # one-time in repo Settings → Secrets → Actions. See
          # docs/AUTO_UPDATER.md for how to generate the key pair.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Picot ${{ github.ref_name }}"
          releaseBody: |
            Automated release for `${{ github.ref_name }}`.
            Download the installer for your platform from the assets below.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --bundles deb,rpm
          # tauri-action will only attach `latest.json` (the updater
          # manifest) when this is `true`. Combined with
          # `bundle.createUpdaterArtifacts` in tauri.conf.json, the
          # release ends up with: installers + `*.sig` files +
          # `latest.json` pinning the URL/signature of each platform
          # bundle. The Tauri updater endpoint then resolves to
          # `https://github.com/.../releases/latest/download/latest.json`.
          updaterJsonPreferNsis: true

      - name: Build Tauri app and publish assets
        if: runner.os != 'Linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing key for the Tauri updater. Required so the bundler
          # produces `*.sig` files and `latest.json` (the manifest the
          # auto-updater reads from the GitHub release). Configure these
          # one-time in repo Settings → Secrets → Actions. See
          # docs/AUTO_UPDATER.md for how to generate the key pair.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Picot ${{ github.ref_name }}"
          releaseBody: |
            Automated release for `${{ github.ref_name }}`.
            Download the installer for your platform from the assets below.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # When a Rust target is set (Intel cross-build on an Apple Silicon
          # runner), pass it through so the bundler emits an x86_64 app.
          args: ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }}
          # tauri-action will only attach `latest.json` (the updater
          # manifest) when this is `true`. Combined with
          # `bundle.createUpdaterArtifacts` in tauri.conf.json, the
          # release ends up with: installers + `*.sig` files +
          # `latest.json` pinning the URL/signature of each platform
          # bundle. The Tauri updater endpoint then resolves to
          # `https://github.com/.../releases/latest/download/latest.json`.
          updaterJsonPreferNsis: true

