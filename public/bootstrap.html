<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picot Startup</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101113;
      color: #e7e8ea;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(680px, calc(100vw - 48px));
      border: 1px solid #2b2e33;
      border-radius: 14px;
      background: #16181c;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 12px; color: #b7bdc8; line-height: 1.45; }
    .error {
      margin: 10px 0 16px;
      border-radius: 10px;
      border: 1px solid #3b2225;
      background: #231417;
      color: #ffb4bd;
      padding: 10px 12px;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 1px solid #2f3744;
      background: #1e2633;
      color: #dce6f8;
      border-radius: 9px;
      padding: 9px 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .hint {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: #8f98a8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Picot could not start</h1>
    <p>The embedded <code>pi</code> runtime that ships with Picot failed to launch.</p>
    <p>This usually means the installation is incomplete or corrupted. Reinstalling Picot normally fixes it. Click <b>Retry startup</b> after reinstalling or rebooting.</p>
    <div id="startup-error" class="error"></div>
    <div class="actions">
      <button id="retry-btn" type="button">Retry startup</button>
    </div>
    <div id="hint" class="hint"></div>
  </main>
  <script>
    const retryBtn = document.getElementById('retry-btn');
    const hint = document.getElementById('hint');
    const errorBox = document.getElementById('startup-error');
    const rawError = new URLSearchParams(window.location.search).get('startupError');
    if (rawError) {
      errorBox.style.display = 'block';
      errorBox.textContent = decodeURIComponent(rawError);
    }

    retryBtn.addEventListener('click', async () => {
      const invoke = window.__TAURI__?.core?.invoke;
      if (typeof invoke !== 'function') {
        hint.textContent = 'Tauri runtime is unavailable in this window.';
        return;
      }
      retryBtn.disabled = true;
      hint.textContent = 'Starting Pi runtime...';
      try {
        const port = await invoke('cmd_retry_startup');
        window.location.href = `http://localhost:${port}`;
      } catch (error) {
        hint.textContent = String(error?.message || error || 'Startup failed');
        retryBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
